# ============================================================================
# Maestro EGP — تحصين nginx للإنتاج (يعالج بندَي تقرير الأمان #10 و #11)
# ضعه على خادم الإنتاج (Contabo) داخل كتلة server الخاصة بموقعك ثم:
#   sudo nginx -t && sudo systemctl reload nginx
# ملاحظة: ترويسات HSTS/X-Frame/X-Content-Type مُطبّقة أصلاً من الخادم (FastAPI)،
#         وهنا نضيفها على مستوى nginx أيضاً + CSP + إجبار HTTPS (طبقة دفاع ثانية).
# ============================================================================

# ---- #11: إعادة توجيه كل حركة HTTP إلى HTTPS ----
server {
    listen 80;
    listen [::]:80;
    server_name maestroegp.com www.maestroegp.com;
    # اسمح فقط بتحدي Let's Encrypt، وأعد توجيه الباقي إلى HTTPS
    location /.well-known/acme-challenge/ { root /var/www/html; }
    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name maestroegp.com www.maestroegp.com;

    # ssl_certificate ...  (اترك إعدادات شهادتك الحالية كما هي)
    # ssl_certificate_key ...

    # ---- #10: ترويسات الأمان ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), microphone=(), camera=()" always;

    # Content-Security-Policy — مضبوطة لتطبيق React PWA.
    # ابدأ بها ثم ضيّقها تدريجياً. عدّل النطاقات إن استخدمت CDN/خطوط خارجية.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://cdnjs.cloudflare.com; font-src 'self' https://fonts.gstatic.com https://cdnjs.cloudflare.com data:; img-src 'self' data: blob: https:; connect-src 'self' https://maestroegp.com wss://maestroegp.com; manifest-src 'self'; worker-src 'self'; frame-ancestors 'self'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # منع كشف إصدار nginx
    server_tokens off;

    # مرّر لواجهة/باكند تطبيقك كالمعتاد
    # location /api/ { proxy_pass http://127.0.0.1:8001; ... }
    # location /    { proxy_pass http://127.0.0.1:3000; ... }  أو root للملفات الثابتة
}
