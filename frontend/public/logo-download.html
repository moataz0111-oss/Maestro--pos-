<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1"/>
<title>تحميل شعار Maestro EGP</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Segoe UI', Tahoma, sans-serif;
    background: radial-gradient(circle at 50% 30%, #1A2B5B 0%, #0c1738 50%, #050A24 100%);
    color: #fff; min-height: 100vh;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    padding: 24px; text-align: center;
  }
  h1 { font-size: 22px; color: #f6a623; margin-bottom: 6px; }
  p  { font-size: 15px; color: #c3cae0; margin-bottom: 24px; }
  .logo-box {
    background: rgba(0,0,0,0.25); border: 1px solid rgba(246,166,35,0.35);
    border-radius: 24px; padding: 18px; margin-bottom: 28px;
  }
  .logo-box img { width: 260px; max-width: 70vw; height: auto; display: block; border-radius: 18px; }
  .dl-btn {
    display: inline-flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, #f6a623, #ffcf66);
    color: #081333; font-size: 19px; font-weight: 800;
    padding: 16px 40px; border-radius: 999px; text-decoration: none;
    box-shadow: 0 8px 24px rgba(246,166,35,0.4);
    transition: transform 0.15s ease, box-shadow 0.15s ease;
  }
  .dl-btn:active { transform: scale(0.96); }
  .hint { margin-top: 22px; font-size: 13px; color: #aeb6cc; line-height: 1.9; max-width: 420px; }
</style>
</head>
<body>
  <h1>شعار Maestro EGP</h1>
  <p>اضغط الزر الذهبي بالأسفل لتحميل الشعار بجودة عالية على جهازك</p>

  <div class="logo-box">
    <img src="/maestro-logo-circle.png" alt="Maestro EGP Logo"/>
  </div>

  <a class="dl-btn" href="/maestro-logo-circle.png" download="maestro-egp-logo.png">
    ⬇ تحميل الشعار
  </a>

  <div class="hint">
    إن لم يبدأ التحميل تلقائياً: اضغط مطوّلاً على الصورة بالأعلى ← اختر «حفظ الصورة» أو «تنزيل الصورة».
  </div>
</body>
</html>
