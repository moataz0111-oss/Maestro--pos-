<!doctype html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
        <meta name="theme-color" content="#f97316" />
        <meta name="description" content="اطلب طعامك المفضل - قائمة الطعام" />
        
        <!-- PWA Meta Tags for iOS -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="default" />
        <meta name="apple-mobile-web-app-title" content="قائمة الطعام" />
        <meta name="mobile-web-app-capable" content="yes" />
        
        <!-- Apple Touch Icons for Customer App -->
        <link rel="apple-touch-icon" href="/icons/customer-icon-192.png" />
        <link rel="apple-touch-icon" sizes="152x152" href="/icons/customer-icon-192.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="/icons/customer-icon-512.png" />
        <link rel="apple-touch-icon" sizes="167x167" href="/icons/customer-icon-192.png" />
        
        <!-- Favicons -->
        <link rel="icon" type="image/png" sizes="32x32" href="/icons/customer-icon-192.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="/icons/customer-icon-192.png" />
        <link rel="shortcut icon" href="/icons/customer-icon-192.png" />
        
        <!-- Manifest للعملاء فقط -->
        <link rel="manifest" href="/manifest-customer.json" />
        
        <!-- Splash Screen for iOS -->
        <meta name="apple-touch-startup-image" href="/icons/customer-icon-512.png" />
        
        <title>قائمة الطعام - اطلب الآن</title>
        
        <style>
            body {
                margin: 0;
                padding: 0;
                font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
                background: linear-gradient(135deg, #f97316 0%, #ea580c 100%);
                min-height: 100vh;
                display: flex;
                align-items: center;
                justify-content: center;
            }
            .loader {
                text-align: center;
                color: white;
            }
            .loader-icon {
                width: 60px;
                height: 60px;
                border: 4px solid rgba(255,255,255,0.3);
                border-top-color: white;
                border-radius: 50%;
                animation: spin 1s linear infinite;
            }
            .loader-text {
                margin-top: 16px;
                font-size: 18px;
                font-weight: 500;
            }
            @keyframes spin {
                to { transform: rotate(360deg); }
            }
        </style>
        
        <script>
            // إعادة التوجيه إلى صفحة قائمة الطعام
            window.location.href = '/menu';
        </script>
    </head>
    <body>
        <div class="loader">
            <div class="loader-icon"></div>
            <div class="loader-text">جاري التحميل...</div>
        </div>
    </body>
</html>
