<!doctype html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
        <meta name="theme-color" content="#1e40af" />
        <meta name="description" content="نظام إدارة المطاعم - Maestro EGP" />
        
        <!-- PWA Meta Tags for iOS -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Maestro EGP" />
        <meta name="mobile-web-app-capable" content="yes" />
        
        <!-- Apple Touch Icons -->
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/admin-icon-192.png" />
        <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/icons/admin-icon-192.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/icons/admin-icon-512.png" />
        <link rel="apple-touch-icon" sizes="167x167" href="%PUBLIC_URL%/icons/admin-icon-192.png" />
        
        <!-- Favicons -->
        <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/icons/admin-icon-192.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/icons/admin-icon-192.png" />
        <link rel="shortcut icon" href="%PUBLIC_URL%/icons/admin-icon-192.png" />
        
        <!-- Manifest - يتم تحديده ديناميكياً -->
        <link rel="manifest" id="app-manifest" href="%PUBLIC_URL%/manifest.json" />
        
        <!-- Splash Screen for iOS -->
        <meta name="apple-touch-startup-image" href="%PUBLIC_URL%/icons/admin-icon-512.png" />
        
        <title>Maestro EGP</title>
        <script src="https://assets.emergent.sh/scripts/emergent-main.js"></script>
        
        <script>
            // تحديد الـ manifest بناءً على المسار
            (function() {
                var path = window.location.pathname;
                var manifestLink = document.getElementById('app-manifest');
                var themeColor = document.querySelector('meta[name="theme-color"]');
                
                if (path.startsWith('/menu')) {
                    // صفحة قائمة العملاء
                    if (manifestLink) manifestLink.href = '/manifest-customer.json';
                    if (themeColor) themeColor.content = '#f97316';
                    document.title = 'قائمة الطعام';
                } else {
                    // نظام الإدارة
                    if (manifestLink) manifestLink.href = '/manifest.json';
                    if (themeColor) themeColor.content = '#1e40af';
                }
            })();
            
            // Register Service Worker
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', function() {
                    // Clear ALL old caches
                    if ('caches' in window) {
                        caches.keys().then(function(names) {
                            names.forEach(function(name) {
                                caches.delete(name);
                                console.log('Deleted cache:', name);
                            });
                        });
                    }
                    
                    // Unregister old service workers
                    navigator.serviceWorker.getRegistrations().then(function(registrations) {
                        registrations.forEach(function(registration) {
                            registration.unregister();
                            console.log('Unregistered SW:', registration.scope);
                        });
                    });
                });
            }
            
            // Only load visual edit scripts when inside an iframe
            if (window.self !== window.top) {
                var cssLink = document.createElement('link');
                cssLink.rel = 'stylesheet';
                cssLink.href = 'https://assets.emergent.sh/visual-edits/styles.css';
                document.head.appendChild(cssLink);
                var jsScript = document.createElement('script');
                jsScript.src = 'https://assets.emergent.sh/visual-edits/script.js';
                document.head.appendChild(jsScript);
            }
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <div id="root"></div>
    </body>
</html>
