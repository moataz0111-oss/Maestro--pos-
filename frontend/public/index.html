<!doctype html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
        <meta name="theme-color" content="#1e40af" />
        <meta name="description" content="نظام إدارة المطاعم - Maestro EGP" />
        
        <!-- PWA Meta Tags for iOS -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="mobile-web-app-capable" content="yes" />
        
        <!-- ⭐ كل وسوم الهوية (مانيفست + أيقونات + اسم + لون) تُكتب لحظة التحليل حسب المسار -->
        <!-- لا توجد أي وسوم ثابتة للمشرف — حتى لا يلتقطها iOS في صفحات الزبائن/السائق إطلاقاً -->
        <script>
            (function() {
                var p = window.location.pathname;
                var kind = p.indexOf('/menu') === 0 ? 'menu' : (p.indexOf('/driver-app') === 0 ? 'driver' : 'admin');
                var i192, i512, title, theme, manifest;
                if (kind === 'menu') {
                    var parts = p.split('/').filter(Boolean);
                    var tenant = parts.length > 1 ? parts[1] : '';
                    try { if (!tenant) tenant = localStorage.getItem('customer_restaurant') || ''; } catch (e) {}
                    i192 = '/icons/customer-icon-192.png'; i512 = '/icons/customer-icon-512.png';
                    title = 'قائمة الطعام'; theme = '#f97316';
                    manifest = tenant ? ('/api/manifest/menu/' + encodeURIComponent(tenant)) : '/manifest-menu.json';
                    document.title = 'قائمة الطعام - اطلب الآن';
                } else if (kind === 'driver') {
                    i192 = '/icons/icon-192.png'; i512 = '/icons/icon-512.png';
                    title = 'تطبيق السائق'; theme = '#16a34a';
                    manifest = '/manifest-driver.json';
                    document.title = 'تطبيق السائق - التوصيل';
                } else {
                    i192 = '/icons/admin-icon-192.png'; i512 = '/icons/admin-icon-512.png';
                    title = 'Maestro EGP'; theme = '#1e40af';
                    manifest = '/manifest.json';
                }
                document.write(
                    '<meta name="theme-color" content="' + theme + '" />' +
                    '<meta name="apple-mobile-web-app-title" content="' + title + '" />' +
                    '<link rel="apple-touch-icon" href="' + i192 + '" />' +
                    '<link rel="apple-touch-icon" sizes="152x152" href="' + i192 + '" />' +
                    '<link rel="apple-touch-icon" sizes="180x180" href="' + i512 + '" />' +
                    '<link rel="apple-touch-icon" sizes="167x167" href="' + i192 + '" />' +
                    '<link rel="icon" type="image/png" sizes="32x32" href="' + i192 + '" />' +
                    '<link rel="icon" type="image/png" sizes="16x16" href="' + i192 + '" />' +
                    '<link rel="shortcut icon" href="' + i192 + '" />' +
                    '<link rel="manifest" id="app-manifest" href="' + manifest + '" />' +
                    '<meta name="apple-touch-startup-image" href="' + i512 + '" />'
                );
            })();
        </script>
        
        <title>Maestro EGP</title>
        
        <script>
            // ⭐ توجيه التطبيقات المثبّتة (PWA) إلى وجهتها الصحيحة عند فتحها من الشاشة الرئيسية
            // عند فتح التطبيق المثبّت يبدأ أحياناً من "/" (بسبب التقاط iOS لمانيفست المشرف)،
            // فنُعيد توجيه السائق/الزبون لشاشته الصحيحة بدل صفحة دخول الموظفين.
            (function() {
                try {
                    var path = window.location.pathname;
                    var isRoot = path === '/' || path === '/index.html' || path === '/login';
                    var isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone === true;
                    var hasStaff = localStorage.getItem('token') || localStorage.getItem('cached_user');
                    if (isRoot && isStandalone && !hasStaff) {
                        var driverSession = localStorage.getItem('driver_app_session');
                        var savedRestaurant = localStorage.getItem('customer_restaurant');
                        if (driverSession) {
                            window.location.replace('/driver-app');
                            return;
                        }
                        if (savedRestaurant) {
                            window.location.replace('/menu/' + savedRestaurant);
                            return;
                        }
                    }
                } catch (e) {}
            })();

            // تبديل manifest حسب المسار (زبائن / سائق) — مبكراً قبل قراءة المتصفح للمانيفست عند التثبيت
            (function() {
                var path = window.location.pathname;
                var manifestLink = document.querySelector('link[rel="manifest"]');
                var themeColor = document.querySelector('meta[name="theme-color"]');
                var appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
                var appleIcons = document.querySelectorAll('link[rel="apple-touch-icon"]');
                if (path.startsWith('/menu')) {
                    // ⭐ مانيفست ديناميكي من الباك إند يحمل معرف المطعم في start_url
                    // (يضمن أن التطبيق المثبّت يفتح على قائمة المطعم وليس صفحة دخول الموظفين)
                    var mparts = path.split('/').filter(Boolean);
                    var mtenant = mparts.length > 1 ? mparts[1] : '';
                    try { if (!mtenant) mtenant = localStorage.getItem('customer_restaurant') || ''; } catch (e) {}
                    if (manifestLink) {
                        manifestLink.href = mtenant
                            ? ('/api/manifest/menu/' + encodeURIComponent(mtenant))
                            : ('/manifest-menu.json?v=' + Date.now());
                    }
                    if (themeColor) themeColor.content = '#f97316';
                    appleIcons.forEach(function(icon) { icon.href = icon.href.replace('admin-icon', 'customer-icon'); });
                    if (appleTitle) appleTitle.content = 'قائمة الطعام';
                    document.title = 'قائمة الطعام - اطلب الآن';
                } else if (path.startsWith('/driver-app')) {
                    if (manifestLink) manifestLink.href = '/manifest-driver.json?v=' + Date.now();
                    if (themeColor) themeColor.content = '#16a34a';
                    appleIcons.forEach(function(icon) { icon.href = icon.href.replace('admin-icon', 'icon'); });
                    if (appleTitle) appleTitle.content = 'تطبيق السائق';
                    document.title = 'تطبيق السائق - التوصيل';
                }
            })();
            
            // تسجيل Service Worker للعمل بدون إنترنت
            // ملاحظة: التسجيل الفعلي يتم في src/index.js لتجنب التسجيل المزدوج
            // الذي قد يسبب إعادة تحميل عشوائية
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <!-- ⭐ Initial loader يظهر قبل تشغيل React (يحلّ محل الشاشة السوداء) -->
        <style>
          html, body { margin: 0; padding: 0; background: #070e22; }
          #initial-splash {
            position: fixed; inset: 0; z-index: 9999999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: radial-gradient(ellipse at 50% 44%, #1a2f57 0%, #0d1a38 52%, #070e22 100%);
            color: #fff;
            transition: opacity 400ms ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
          }
          #initial-splash .glow {
            position: absolute; inset: 0; pointer-events: none;
            background: radial-gradient(ellipse at center, rgba(255,200,80,0.18) 0%, transparent 60%);
          }
          #initial-splash .watermark {
            position: absolute; left: 50%; top: 50%;
            width: 62vmin; height: 62vmin; transform: translate(-50%, -54%);
            opacity: 0.06; pointer-events: none;
          }
          #initial-splash h1 {
            font-size: clamp(40px, 7.5vw, 116px);
            font-weight: 800;
            letter-spacing: 0.02em;
            text-shadow: 0 4px 30px rgba(0,0,0,0.6), 0 0 60px rgba(255,200,80,0.35);
            margin: 22px 0 0 0;
            line-height: 1.05;
            opacity: 0;
            transform: translateY(20px);
            animation: splash-in 900ms cubic-bezier(0.22,1,0.36,1) 1200ms both;
          }
          #initial-splash .logo {
            filter: drop-shadow(0 8px 30px rgba(255,200,80,0.35));
            animation: logo-enter 1100ms cubic-bezier(0.22,1,0.36,1) both, logo-float 3.6s ease-in-out 1.1s infinite;
            opacity: 0;
          }
          #initial-splash .logo .ring {
            transform-origin: 100px 100px;
            transform-box: fill-box;
            animation: ring-spin 6s linear 1.1s infinite;
          }
          #initial-splash .logo .hex {
            stroke-dasharray: 720; stroke-dashoffset: 720;
            animation: hex-draw 1400ms cubic-bezier(0.65,0,0.35,1) 200ms forwards;
          }
          #initial-splash .logo .m {
            stroke-dasharray: 460; stroke-dashoffset: 460;
            animation: m-draw 1200ms cubic-bezier(0.65,0,0.35,1) 800ms forwards;
          }
          #initial-splash .logo .dot {
            opacity: 0;
            transform-origin: 100px 100px; transform-box: fill-box;
            animation: dot-pulse 2s ease-in-out 1.6s infinite;
          }
          #initial-splash h1 .egp {
            background: linear-gradient(180deg, #ffd166 0%, #f59e0b 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
          }
          #initial-splash .line {
            width: 0; height: 3px; margin-top: 18px; border-radius: 999px;
            background: linear-gradient(90deg, transparent, #f59e0b, transparent);
            animation: splash-line 1200ms cubic-bezier(0.22,1,0.36,1) 600ms forwards;
          }
          #initial-splash .bar {
            margin-top: 28px; width: 180px; height: 3px;
            background: rgba(255,255,255,0.15); border-radius: 999px; overflow: hidden;
            opacity: 0; animation: splash-bar-show 600ms ease 1200ms forwards;
          }
          #initial-splash .bar > i {
            display: block; height: 100%; width: 35%;
            background: linear-gradient(90deg, transparent, #ffd166, transparent);
            animation: splash-bar-move 1.2s ease-in-out infinite;
          }
          @keyframes splash-in {
            0%   { opacity: 0; transform: translateY(20px) scale(0.95); filter: blur(8px); letter-spacing: 0.15em; }
            60%  { opacity: 1; filter: blur(0); }
            100% { opacity: 1; transform: translateY(0) scale(1); filter: blur(0); letter-spacing: 0.02em; }
          }
          @keyframes logo-enter {
            0%   { opacity: 0; transform: scale(0.4) rotate(-90deg); }
            60%  { opacity: 1; transform: scale(1.08) rotate(5deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg); }
          }
          @keyframes logo-float {
            0%, 100% { transform: translateY(0); }
            50%      { transform: translateY(-6px); }
          }
          @keyframes ring-spin { to { transform: rotate(360deg); } }
          @keyframes hex-draw { to { stroke-dashoffset: 0; } }
          @keyframes m-draw { to { stroke-dashoffset: 0; } }
          @keyframes dot-pulse {
            0%, 100% { opacity: 0.3; transform: scale(0.6); }
            50%      { opacity: 1;   transform: scale(1.4); }
          }
          @keyframes splash-line { to { width: 240px; opacity: 1; } from { width: 0; opacity: 0; } }
          @keyframes splash-bar-show { to { opacity: 1; } }
          @keyframes splash-bar-move {
            0% { transform: translateX(-100%); } 100% { transform: translateX(420%); }
          }
          #initial-splash .flash {
            position: absolute; left: 50%; top: 38%;
            width: 46vmin; height: 46vmin;
            transform: translate(-50%, -50%) scale(0.2);
            border-radius: 50%;
            background: radial-gradient(circle, rgba(255,238,170,0.95) 0%, rgba(255,209,102,0.55) 32%, transparent 70%);
            opacity: 0; pointer-events: none; mix-blend-mode: screen; filter: blur(2px);
            animation: splash-flash 3.6s ease-out 2200ms infinite;
          }
          @keyframes splash-flash {
            0%   { opacity: 0; transform: translate(-50%, -50%) scale(0.2); }
            10%  { opacity: 0.95; transform: translate(-50%, -50%) scale(1); }
            28%  { opacity: 0; transform: translate(-50%, -50%) scale(1.7); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(1.7); }
          }
        </style>
        <div id="initial-splash" aria-hidden="true">
          <div class="glow"></div>
          <div class="flash"></div>
          <svg class="watermark" viewBox="0 0 200 200">
            <polygon points="100,30 158,62 158,138 100,170 42,138 42,62" fill="none" stroke="#ffd166" stroke-width="3"/>
            <path d="M55 142 V70 L100 120 L145 70 V142" fill="none" stroke="#ffd166" stroke-width="8"/>
          </svg>
          <svg viewBox="0 0 200 200" width="140" height="140" class="logo">
            <defs>
              <linearGradient id="g1" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#ffe7a0"/>
                <stop offset="50%" stop-color="#ffd166"/>
                <stop offset="100%" stop-color="#f59e0b"/>
              </linearGradient>
              <filter id="gl" x="-50%" y="-50%" width="200%" height="200%">
                <feGaussianBlur stdDeviation="3" result="b"/>
                <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
              </filter>
            </defs>
            <g class="ring">
              <circle cx="100" cy="100" r="92" stroke="url(#g1)" stroke-width="2" fill="none" opacity="0.55"/>
              <circle cx="100" cy="100" r="92" stroke="url(#g1)" stroke-width="3" fill="none" stroke-dasharray="40 200" stroke-linecap="round"/>
            </g>
            <polygon points="100,18 168,55 168,145 100,182 32,145 32,55" fill="none" stroke="url(#g1)" stroke-width="3.5" filter="url(#gl)" class="hex"/>
            <path d="M55 142 V70 L100 120 L145 70 V142" fill="none" stroke="url(#g1)" stroke-width="9" stroke-linecap="round" stroke-linejoin="round" filter="url(#gl)" class="m"/>
            <circle cx="100" cy="100" r="4" fill="url(#g1)" class="dot"/>
          </svg>
          <h1>Maestro <span class="egp">EGP</span></h1>
          <div class="line"></div>
          <div class="bar"><i></i></div>
        </div>
        <div id="root"></div>
    </body>
</html>
