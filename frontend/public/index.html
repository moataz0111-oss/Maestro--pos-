<!doctype html>
<html lang="ar" dir="rtl">
    <head>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
        <meta name="theme-color" content="#1e40af" />
        <meta name="description" content="نظام إدارة المطاعم - Maestro EGP" />
        
        <!-- PWA Meta Tags for iOS -->
        <meta name="apple-mobile-web-app-capable" content="yes" />
        <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
        <meta name="apple-mobile-web-app-title" content="Maestro EGP" />
        <meta name="mobile-web-app-capable" content="yes" />
        
        <!-- Apple Touch Icons -->
        <link rel="apple-touch-icon" href="%PUBLIC_URL%/icons/admin-icon-192.png" />
        <link rel="apple-touch-icon" sizes="152x152" href="%PUBLIC_URL%/icons/admin-icon-192.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="%PUBLIC_URL%/icons/admin-icon-512.png" />
        <link rel="apple-touch-icon" sizes="167x167" href="%PUBLIC_URL%/icons/admin-icon-192.png" />
        
        <!-- Favicons -->
        <link rel="icon" type="image/png" sizes="32x32" href="%PUBLIC_URL%/icons/admin-icon-192.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="%PUBLIC_URL%/icons/admin-icon-192.png" />
        <link rel="shortcut icon" href="%PUBLIC_URL%/icons/admin-icon-192.png" />
        
        <!-- Manifest - نظام الإدارة افتراضياً -->
        <link rel="manifest" id="app-manifest" href="%PUBLIC_URL%/manifest.json" />
        
        <!-- Splash Screen for iOS -->
        <meta name="apple-touch-startup-image" href="%PUBLIC_URL%/icons/admin-icon-512.png" />
        
        <title>Maestro EGP</title>
        <script src="https://assets.emergent.sh/scripts/emergent-main.js"></script>
        
        <script>
            // تبديل manifest للزبائن إذا كان المسار /menu
            (function() {
                var isCustomerPath = window.location.pathname.startsWith('/menu');
                if (isCustomerPath) {
                    // تحديث manifest link
                    var manifestLink = document.querySelector('link[rel="manifest"]');
                    if (manifestLink) {
                        manifestLink.href = '/manifest-customer.json?v=' + Date.now();
                    }
                    // تحديث theme color
                    var themeColor = document.querySelector('meta[name="theme-color"]');
                    if (themeColor) themeColor.content = '#f97316';
                    // تحديث apple icons
                    var appleIcons = document.querySelectorAll('link[rel="apple-touch-icon"]');
                    appleIcons.forEach(function(icon) {
                        icon.href = icon.href.replace('admin-icon', 'customer-icon');
                    });
                    // تحديث apple title
                    var appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
                    if (appleTitle) appleTitle.content = 'قائمة الطعام';
                    // تحديث عنوان الصفحة
                    document.title = 'قائمة الطعام - اطلب الآن';
                }
            })();
            
            // Only load visual edit scripts when inside an iframe
            if (window.self !== window.top) {
                var cssLink = document.createElement('link');
                cssLink.rel = 'stylesheet';
                cssLink.href = 'https://assets.emergent.sh/visual-edits/styles.css';
                document.head.appendChild(cssLink);
                var jsScript = document.createElement('script');
                jsScript.src = 'https://assets.emergent.sh/visual-edits/script.js';
                document.head.appendChild(jsScript);
            }
            
            // تسجيل Service Worker للعمل بدون إنترنت
            // ملاحظة: التسجيل الفعلي يتم في src/index.js لتجنب التسجيل المزدوج
            // الذي قد يسبب إعادة تحميل عشوائية
        </script>
    </head>
    <body>
        <noscript>You need to enable JavaScript to run this app.</noscript>
        <!-- ⭐ Initial loader يظهر قبل تشغيل React (يحلّ محل الشاشة السوداء) -->
        <style>
          html, body { margin: 0; padding: 0; background: #0f0f1e; }
          #initial-splash {
            position: fixed; inset: 0; z-index: 9999999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f0f1e 100%);
            color: #fff;
            transition: opacity 400ms ease;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
          }
          #initial-splash .glow {
            position: absolute; inset: 0; pointer-events: none;
            background: radial-gradient(ellipse at center, rgba(255,200,80,0.18) 0%, transparent 60%);
          }
          #initial-splash h1 {
            font-size: clamp(48px, 9vw, 140px);
            font-weight: 800;
            letter-spacing: 0.02em;
            text-shadow: 0 4px 30px rgba(0,0,0,0.6), 0 0 60px rgba(255,200,80,0.35);
            margin: 0;
            line-height: 1.05;
            animation: splash-in 900ms cubic-bezier(0.22,1,0.36,1) both;
          }
          #initial-splash h1 .egp {
            background: linear-gradient(180deg, #ffd166 0%, #f59e0b 100%);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
          }
          #initial-splash .line {
            width: 0; height: 3px; margin-top: 18px; border-radius: 999px;
            background: linear-gradient(90deg, transparent, #f59e0b, transparent);
            animation: splash-line 1200ms cubic-bezier(0.22,1,0.36,1) 600ms forwards;
          }
          #initial-splash .bar {
            margin-top: 28px; width: 180px; height: 3px;
            background: rgba(255,255,255,0.15); border-radius: 999px; overflow: hidden;
            opacity: 0; animation: splash-bar-show 600ms ease 1200ms forwards;
          }
          #initial-splash .bar > i {
            display: block; height: 100%; width: 35%;
            background: linear-gradient(90deg, transparent, #ffd166, transparent);
            animation: splash-bar-move 1.2s ease-in-out infinite;
          }
          @keyframes splash-in {
            0%   { opacity: 0; transform: scale(0.88); filter: blur(8px); }
            60%  { opacity: 1; filter: blur(0); }
            100% { opacity: 1; transform: scale(1); filter: blur(0); }
          }
          @keyframes splash-line { to { width: 240px; opacity: 1; } from { width: 0; opacity: 0; } }
          @keyframes splash-bar-show { to { opacity: 1; } }
          @keyframes splash-bar-move {
            0% { transform: translateX(-100%); } 100% { transform: translateX(420%); }
          }
        </style>
        <div id="initial-splash" aria-hidden="true">
          <div class="glow"></div>
          <h1>Maestro <span class="egp">EGP</span></h1>
          <div class="line"></div>
          <div class="bar"><i></i></div>
        </div>
        <div id="root"></div>
    </body>
</html>
