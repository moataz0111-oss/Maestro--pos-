version: '3.8'

services:
  # قاعدة البيانات MongoDB
  mongodb:
    image: mongo:6.0
    container_name: maestro-mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
      - ./deploy/backups:/backups
    environment:
      - MONGO_INITDB_ROOT_USERNAME=maestro_admin
      - MONGO_INITDB_ROOT_PASSWORD=Maestro@2024Secure
    networks:
      - maestro-network

  # Backend - FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maestro-backend
    restart: always
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://maestro_admin:Maestro@2024Secure@mongodb:27017/maestro_db?authSource=admin
      - DB_NAME=maestro_db
      - JWT_SECRET=your-super-secret-jwt-key-change-this-in-production
    ports:
      - "8001:8001"
    networks:
      - maestro-network

  # Frontend - React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=https://maestroegp.com
    container_name: maestro-frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "3000:3000"
    networks:
      - maestro-network

  # Portainer - إدارة Docker من واجهة ويب
  portainer:
    image: portainer/portainer-ce:latest
    container_name: maestro-portainer
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - maestro-network

  # Netdata - مراقبة موارد السيرفر
  netdata:
    image: netdata/netdata:stable
    container_name: maestro-netdata
    restart: always
    ports:
      - "19999:19999"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - NETDATA_CLAIM_TOKEN=
      - NETDATA_CLAIM_ROOMS=
    networks:
      - maestro-network

volumes:
  mongodb_data:
  portainer_data:

networks:
  maestro-network:
    driver: bridge
