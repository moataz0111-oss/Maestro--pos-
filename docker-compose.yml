version: '3.8'

services:
  # قاعدة البيانات MongoDB
  mongodb:
    image: mongo:6.0
    container_name: maestro-mongodb
    restart: always
    volumes:
      - mongodb_data:/data/db
      - ./deploy/backups:/backups
    environment:
      - MONGO_INITDB_ROOT_USERNAME=maestro_admin
      - MONGO_INITDB_ROOT_PASSWORD=Maestro@2024Secure
    networks:
      - maestro-network

  # Backend - FastAPI
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: maestro-backend
    restart: always
    depends_on:
      - mongodb
    environment:
      - MONGO_URL=mongodb://maestro_admin:Maestro@2024Secure@mongodb:27017/maestro_db?authSource=admin
      - DB_NAME=maestro_db
      - JWT_SECRET=your-super-secret-jwt-key-change-this-in-production
    networks:
      - maestro-network

  # Frontend - React
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - REACT_APP_BACKEND_URL=https://maestroegp.com
    container_name: maestro-frontend
    restart: always
    depends_on:
      - backend
    networks:
      - maestro-network

  # Nginx Reverse Proxy with SSL
  nginx:
    image: nginx:alpine
    container_name: maestro-nginx
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - ./certbot/conf:/etc/letsencrypt:ro
      - ./certbot/www:/var/www/certbot:ro
    depends_on:
      - frontend
      - backend
    networks:
      - maestro-network

  # Certbot for SSL
  certbot:
    image: certbot/certbot
    container_name: maestro-certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"

  # Portainer - إدارة Docker من واجهة ويب
  portainer:
    image: portainer/portainer-ce:latest
    container_name: maestro-portainer
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    networks:
      - maestro-network

  # Netdata - مراقبة موارد السيرفر
  netdata:
    image: netdata/netdata:stable
    container_name: maestro-netdata
    restart: always
    ports:
      - "19999:19999"
    cap_add:
      - SYS_PTRACE
    security_opt:
      - apparmor:unconfined
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - maestro-network

volumes:
  mongodb_data:
  portainer_data:

networks:
  maestro-network:
    driver: bridge
