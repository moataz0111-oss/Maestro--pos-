name: 🚀 Deploy Maestro POS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

# 🔒 قفل تزامن: نشر واحد فقط في كل مرة.
# ⚠️ لا نُلغي النشر الجاري (cancel-in-progress=false) لأن إلغاءه في منتصف إعادة تشغيل
#    الحاويات (بعد إيقاف nginx وقبل تشغيله) كان يُسقط الموقع. الآن تُصطفّ عمليات النشر بالتتابع.
concurrency:
  group: deploy-maestro-vps
  cancel-in-progress: false

# 🟢 فرض تشغيل جميع إجراءات JavaScript على Node.js 24 → يُزيل تحذير إهمال Node 20 نهائياً من اللوق
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write   # مطلوب لدفع صورة الواجهة إلى GHCR

    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v5

    # =============================================
    # ⚡ بناء الواجهة على خوادم GitHub السريعة (بدل الـVPS المحدود الذاكرة)
    #    → يقلّل وقت البناء من ~18 دقيقة إلى ~3 دقائق، ويُلغي تعليق/نفاد ذاكرة الـVPS
    # =============================================
    - name: 🏷️ Compute image names (lowercase)
      id: img
      run: |
        REPO=$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')
        echo "name=ghcr.io/${REPO}-frontend" >> "$GITHUB_OUTPUT"
        echo "backend=ghcr.io/${REPO}-backend" >> "$GITHUB_OUTPUT"

    - name: 🐳 Set up Buildx
      uses: docker/setup-buildx-action@v3

    - name: 🔑 Login to GHCR
      uses: docker/login-action@v3
      with:
        registry: ghcr.io
        username: ${{ github.actor }}
        password: ${{ secrets.GITHUB_TOKEN }}

    - name: 🏗️ Build & push frontend image
      continue-on-error: true
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ steps.img.outputs.name }}:latest
          ${{ steps.img.outputs.name }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: type=gha,mode=max

    # =============================================
    # ⚡ بناء الـBackend أيضاً على خوادم GitHub (بدل الـVPS المحدود الذاكرة)
    #    → يُلغي فشل/نفاد ذاكرة الـVPS أثناء pip install
    # =============================================
    - name: 🏗️ Build & push backend image
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        push: true
        no-cache: true
        tags: |
          ${{ steps.img.outputs.backend }}:latest
          ${{ steps.img.outputs.backend }}:${{ github.sha }}

    # =============================================
    # 🚀 النشر على الـVPS: بناء الـBackend محلياً + سحب صورة الواجهة الجاهزة
    # =============================================
    - name: 🔑 Deploy
      uses: appleboy/ssh-action@v1.0.3
      env:
        GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        GHCR_USER: ${{ github.actor }}
        FRONTEND_IMAGE: ${{ steps.img.outputs.name }}
        BACKEND_IMAGE: ${{ steps.img.outputs.backend }}
        GIT_SHA: ${{ github.sha }}
      with:
        host: 158.220.118.54
        username: root
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        command_timeout: 60m
        envs: GHCR_TOKEN,GHCR_USER,FRONTEND_IMAGE,BACKEND_IMAGE,GIT_SHA
        script: |
          echo "🚀 بدء النشر..."
          cd /var/www/maestro

          # سحب الكود
          git fetch origin && git reset --hard origin/main

          # ضمان عمل الشبكة
          docker network create maestro_maestro-network 2>/dev/null || true

          # دالة: ضمان أن nginx يعمل (تُعيد الموقع فوراً)
          ensure_nginx() {
            if ! docker ps --format '{{.Names}}' | grep -q '^nginx$'; then
              echo "🌐 nginx متوقف — إعادة تشغيله لإعادة الموقع..."
              docker rm -f nginx 2>/dev/null || true
              docker run -d --name nginx --restart unless-stopped \
                --network maestro_maestro-network \
                -p 80:80 -p 443:443 \
                -v /var/www/maestro/nginx.conf:/etc/nginx/nginx.conf:ro \
                -v /var/www/maestro/ssl:/etc/nginx/ssl:ro \
                nginx:alpine || true
            fi
          }

          # ضمان عمل MongoDB
          if ! docker ps --format '{{.Names}}' | grep -q '^maestro-mongodb$'; then
            echo "🗄️ تشغيل MongoDB..."
            docker rm -f maestro-mongodb 2>/dev/null || true
            docker run -d --name maestro-mongodb --restart unless-stopped --network maestro_maestro-network -v maestro_mongodb_data:/data/db mongo:7
            sleep 10
          fi

          # ضمان شهادات SSL جاهزة (قبل nginx)
          mkdir -p /var/www/maestro/ssl
          cp /var/www/maestro/certbot/conf/archive/maestroegp.com/fullchain1.pem /var/www/maestro/ssl/fullchain.pem 2>/dev/null || true
          cp /var/www/maestro/certbot/conf/archive/maestroegp.com/privkey1.pem /var/www/maestro/ssl/privkey.pem 2>/dev/null || true

          # 🔴 الأهم: إعادة الموقع فوراً إن كانت nginx متوقفة (قبل أي تحديث محفوف بالمخاطر)
          ensure_nginx

          # تسجيل الدخول إلى GHCR (لسحب صور الـBackend والـFrontend الجاهزة)
          echo "$GHCR_TOKEN" | docker login ghcr.io -u "$GHCR_USER" --password-stdin 2>&1 | grep -v "credentials are stored unencrypted\|Configure a credential helper\|credential-store" || true

          # =============================================
          # تحديث Backend — لا نُوقف القديمة إلا عند نجاح سحب الجديدة (يضمن عدم توقف الموقع)
          # =============================================
          echo "📦 تحديث Backend (سحب صورة هذا الإصدار بالـSHA من GHCR)..."
          BK_TAG="$BACKEND_IMAGE:$GIT_SHA"
          if ! docker pull "$BK_TAG"; then
            echo "⚠️ صورة الـSHA غير موجودة (قد يكون البناء فشل) — محاولة :latest"
            BK_TAG="$BACKEND_IMAGE:latest"
            docker pull "$BK_TAG" || BK_TAG=""
          fi
          if [ -n "$BK_TAG" ]; then
            echo "🚀 تشغيل الـBackend من: $BK_TAG"
            docker stop backend 2>/dev/null || true
            docker rm backend 2>/dev/null || true
            docker run -d --name backend --restart unless-stopped \
              --network maestro_maestro-network \
              -v /var/www/maestro/uploads:/app/uploads \
              -e MONGO_URL="mongodb://maestro-mongodb:27017" \
              -e DB_NAME="maestro_db" \
              "$BK_TAG"
            sleep 10
          else
            echo "⚠️ تعذّر سحب صورة الـBackend — الإبقاء على النسخة الحالية. الموقع يبقى يعمل."
            docker start backend 2>/dev/null || true
          fi

          # =============================================
          # تحديث Frontend — نفس المبدأ (لا نُوقف القديمة إلا عند نجاح السحب)
          # =============================================
          echo "🎨 تحديث Frontend (سحب صورة جاهزة من GHCR)..."
          if docker pull "$FRONTEND_IMAGE:latest"; then
            docker stop frontend 2>/dev/null || true
            docker rm frontend 2>/dev/null || true
            docker run -d --name frontend --restart unless-stopped \
              --network maestro_maestro-network \
              "$FRONTEND_IMAGE:latest"
          else
            echo "⚠️ تعذّر سحب صورة الـFrontend — الإبقاء على النسخة الحالية."
            docker start frontend 2>/dev/null || true
          fi
          docker logout ghcr.io 2>/dev/null || true

          # =============================================
          # إعادة إنشاء Nginx لتطبيق أي تغييرات config وربط الحاويات الجديدة
          # =============================================
          echo "🌐 تحديث Nginx..."
          docker stop nginx 2>/dev/null || true
          docker rm nginx 2>/dev/null || true
          docker run -d --name nginx --restart unless-stopped \
            --network maestro_maestro-network \
            -p 80:80 -p 443:443 \
            -v /var/www/maestro/nginx.conf:/etc/nginx/nginx.conf:ro \
            -v /var/www/maestro/ssl:/etc/nginx/ssl:ro \
            nginx:alpine || true

          # ضمان نهائي أن nginx تعمل مهما حدث
          sleep 3
          ensure_nginx

          # =============================================
          # التحقق النهائي (تحذيرات فقط — لا نُفشل النشر بعد أن عاد الموقع)
          # =============================================
          sleep 5
          echo ""
          echo "📊 حالة الخدمات:"
          docker ps --format "table {{.Names}}\t{{.Status}}"
          echo ""
          BACKEND_OK=0
          for i in 1 2 3 4 5 6; do
            if curl -s http://127.0.0.1/api/health | grep -q "ok"; then
              BACKEND_OK=1
              break
            fi
            echo "⏳ انتظار جاهزية الـBackend... ($i)"
            sleep 8
          done
          if [ "$BACKEND_OK" = "1" ]; then
            echo "✅ النشر نجح والموقع يعمل والـBackend يستجيب!"
          else
            echo "❌❌❌ الـBackend لا يستجيب (502). سجلّ أخطاء الـBackend (آخر 100 سطر): ❌❌❌"
            echo "==================== BACKEND LOGS START ===================="
            docker logs backend --tail 100 2>&1 || true
            echo "==================== BACKEND LOGS END ======================"
            echo "حالة حاوية الـBackend:"
            docker ps -a --filter "name=backend" --format "table {{.Names}}\t{{.Status}}" || true
            echo ""
            echo "🔴🔴🔴 ROOT CAUSE (أهم سطر من الخطأ): 🔴🔴🔴"
            docker logs backend 2>&1 | grep -iE "Error|Exception|No module|cannot open|cannot import|Traceback" | tail -15 || echo "(لا يوجد سطر خطأ واضح)"
            echo "🔴🔴🔴 END ROOT CAUSE 🔴🔴🔴"
          fi
          RESET_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X POST "http://127.0.0.1/api/advances/reset-before-month?month=2026-01")
          echo "🔎 reset route code: $RESET_CODE"

          # تنظيف
          docker image prune -f 2>/dev/null || true
          echo "✅ انتهى!"
