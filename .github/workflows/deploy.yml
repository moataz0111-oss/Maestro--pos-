name: 🚀 Deploy Maestro POS to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔑 Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 158.220.118.54
        username: root
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        command_timeout: 30m
        script: |
          echo "🚀 بدء النشر..."
          
          # حذف أي سكربتات معطوبة
          rm -f /usr/local/bin/docker-compose 2>/dev/null || true
          
          cd /var/www/maestro
          
          # سحب الكود
          git fetch origin
          git reset --hard origin/main
          
          # التأكد من MongoDB
          if ! docker ps | grep -q maestro-mongodb; then
            docker-compose up -d mongodb
            sleep 15
          fi
          
          # ============================================
          # حل مشكلة ContainerConfig نهائياً
          # ============================================
          echo "🧹 تنظيف Docker لحل ContainerConfig..."
          
          # إيقاف كل الخدمات ما عدا MongoDB
          docker stop maestro-frontend maestro-backend maestro-nginx 2>/dev/null || true
          
          # حذف الـ containers بالقوة
          docker rm -f maestro-frontend maestro-backend maestro-nginx 2>/dev/null || true
          
          # حذف الـ images القديمة
          docker rmi -f maestro_frontend maestro_backend maestro-frontend maestro-backend 2>/dev/null || true
          docker rmi -f $(docker images -q --filter "dangling=true") 2>/dev/null || true
          
          # تنظيف الشبكات والـ cache
          docker network prune -f 2>/dev/null || true
          docker builder prune -f 2>/dev/null || true
          docker system prune -f 2>/dev/null || true
          
          echo "✅ تم التنظيف"
          
          # ============================================
          # بناء جديد تماماً
          # ============================================
          echo "🔨 بناء الـ images..."
          docker-compose build --no-cache frontend backend
          
          # تشغيل الخدمات
          echo "🚀 تشغيل الخدمات..."
          docker-compose up -d mongodb
          sleep 5
          docker-compose up -d backend
          sleep 10
          docker-compose up -d frontend nginx
          
          # انتظار
          echo "⏳ انتظار بدء الخدمات..."
          sleep 30
          
          # تحقق
          docker-compose ps
          
          # اختبار
          if curl -s http://127.0.0.1/api/health | grep -q "ok"; then
            echo "✅ الخدمات تعمل!"
          else
            echo "⚠️ إعادة التشغيل..."
            docker-compose restart backend frontend nginx
            sleep 20
          fi
          
          echo "✅ تم النشر بنجاح!"
          
    - name: 📢 Notify Success
      if: success()
      run: echo "✅ Deployment successful!"
      
    - name: ❌ Notify Failure
      if: failure()
      run: echo "❌ Deployment failed!"
