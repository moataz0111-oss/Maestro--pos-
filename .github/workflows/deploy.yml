name: 🚀 Deploy Maestro POS to Production

on:
  push:
    branches: [ main, conflict_230326_0646 ]
  workflow_dispatch:  # للتشغيل اليدوي

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔑 Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          echo "🚀 Starting deployment at $(date)"
          
          # إيقاف Nginx القديم على Ubuntu
          echo "🛑 Stopping old nginx..."
          systemctl stop nginx 2>/dev/null || true
          systemctl disable nginx 2>/dev/null || true
          
          # الدخول لمجلد المشروع
          cd /var/www/maestro
          
          # سحب أحدث الكود
          git fetch origin
          git reset --hard origin/conflict_230326_0646
          
          # إنشاء مجلدات
          mkdir -p certbot/conf certbot/www backups
          
          # إيقاف containers القديمة (بدون حذف البيانات)
          docker-compose down 2>/dev/null || true
          
          # بناء وتشغيل Docker
          echo "🔨 Building and starting services..."
          docker-compose up -d --build --force-recreate
          
          # انتظار بدء الخدمات
          echo "⏳ Waiting for services to start..."
          sleep 45
          
          # عرض حالة الخدمات
          echo "📊 Services status:"
          docker-compose ps
          
          # عرض logs للتحقق من الأخطاء
          echo "📋 Backend logs:"
          docker-compose logs --tail=50 backend
          
          echo "📋 Frontend logs:"
          docker-compose logs --tail=20 frontend
          
          echo "📋 Nginx logs:"
          docker-compose logs --tail=20 nginx
          
          # انتظار MongoDB
          echo "⏳ Waiting for MongoDB..."
          for i in {1..30}; do
            if docker exec maestro-mongodb mongosh --eval "db.adminCommand('ping')" -u maestro_admin -p "Maestro@2024Secure" --authenticationDatabase admin > /dev/null 2>&1; then
              echo "✅ MongoDB is ready"
              break
            fi
            echo "Waiting for MongoDB... ($i/30)"
            sleep 5
          done
          
          # تشغيل سكريبت إدخال البيانات
          echo "📦 Running seed data script..."
          docker exec maestro-backend pip install bcrypt pymongo 2>/dev/null || true
          docker exec maestro-backend python /app/seed_data.py || echo "Seed completed"
          
          # إعداد Backup التلقائي
          chmod +x /var/www/maestro/scripts/backup.sh 2>/dev/null || true
          (crontab -l 2>/dev/null | grep -v "maestro.*backup"; echo "0 3 * * * /var/www/maestro/scripts/backup.sh >> /var/log/maestro-backup.log 2>&1") | crontab -
          
          # تنظيف
          docker image prune -f
          
          echo "✅ Deployment completed at $(date)"
          
    - name: 📢 Notify Success
      if: success()
      run: echo "✅ Deployment successful!"
      
    - name: ❌ Notify Failure
      if: failure()
      run: echo "❌ Deployment failed!"
