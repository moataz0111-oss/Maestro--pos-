name: 🚀 Deploy Maestro POS to Production

on:
  push:
    branches: [ main, conflict_230326_0646 ]
  workflow_dispatch:  # للتشغيل اليدوي

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔑 Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          echo "🚀 Starting deployment at $(date)"
          
          # الدخول لمجلد المشروع
          cd /var/www/maestro
          
          # سحب أحدث الكود
          git fetch origin
          git reset --hard origin/conflict_230326_0646
          
          # إعادة بناء وتشغيل Docker من المجلد الرئيسي
          docker-compose down 2>/dev/null || true
          docker-compose up -d --build --remove-orphans
          
          # انتظار بدء الخدمات
          echo "⏳ Waiting for services to start..."
          sleep 45
          
          # انتظار MongoDB
          echo "⏳ Waiting for MongoDB..."
          until docker exec maestro-mongodb mongosh --eval "db.adminCommand('ping')" -u maestro_admin -p "Maestro@2024Secure" --authenticationDatabase admin > /dev/null 2>&1; do
            echo "Waiting for MongoDB..."
            sleep 5
          done
          echo "✅ MongoDB is ready"
          
          # تثبيت المتطلبات وتشغيل سكريبت إدخال البيانات الأساسية
          echo "📦 Running seed data script..."
          docker exec maestro-backend pip install passlib bcrypt pymongo 2>/dev/null || true
          docker exec maestro-backend python /app/seed_data.py
          
          echo "✅ Seed data completed"
          
          # تنظيف الـ images القديمة
          docker image prune -f
          
          # عرض حالة الخدمات
          docker-compose ps
          
          echo "✅ Deployment completed at $(date)"
          
    - name: 📢 Notify Success
      if: success()
      run: echo "✅ Deployment successful!"
      
    - name: ❌ Notify Failure
      if: failure()
      run: echo "❌ Deployment failed!"
