name: 🚀 Deploy Maestro POS to Production

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔑 Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 158.220.118.54
        username: root
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        command_timeout: 30m
        script: |
          echo "🚀 Starting Zero-Downtime deployment at $(date)"
          echo ""
          echo "============================================="
          echo "⚠️ حماية البيانات - Data Protection"
          echo "============================================="
          echo "✅ MongoDB لن يتوقف أبداً"
          echo "✅ بيانات العملاء محمية"
          echo "✅ بياناتك محمية"
          echo "✅ لا حذف - لا تعديل - لا إعادة إنشاء"
          echo "============================================="
          echo ""
          
          # إيقاف Nginx القديم على Ubuntu
          systemctl stop nginx 2>/dev/null || true
          systemctl disable nginx 2>/dev/null || true
          
          cd /var/www/maestro
          
          # سحب الكود
          echo "📥 Pulling latest code..."
          git fetch origin
          git reset --hard origin/main
          
          mkdir -p certbot/conf certbot/www backups deploy/backups uploads
          
          # =============================================
          # 🛡️ التحقق من أن MongoDB يعمل ولا نمسه أبداً
          # =============================================
          
          echo ""
          echo "🛡️ Checking MongoDB status..."
          if docker ps | grep -q maestro-mongodb; then
            echo "✅ MongoDB is running - will NOT be touched"
            echo "✅ All data is safe and protected"
          else
            echo "⚠️ MongoDB is not running, starting it..."
            docker-compose up -d mongodb
            sleep 15
            echo "✅ MongoDB started"
          fi
          
          # SSL check (first time only)
          if [ ! -d "certbot/conf/live/maestroegp.com" ]; then
            echo ""
            echo "🔐 Getting SSL certificate (first time only)..."
            # نوقف فقط frontend, backend, nginx - ليس MongoDB!
            docker-compose stop frontend backend nginx 2>/dev/null || true
            
            cat > nginx-temp.conf << 'NGINXEOF'
          events { worker_connections 1024; }
          http {
            server {
              listen 80;
              server_name maestroegp.com www.maestroegp.com;
              location /.well-known/acme-challenge/ { root /var/www/certbot; }
              location / { return 200 'SSL Setup'; add_header Content-Type text/plain; }
            }
          }
          NGINXEOF
            
            docker run -d --name temp-nginx -p 80:80 \
              -v $(pwd)/nginx-temp.conf:/etc/nginx/nginx.conf:ro \
              -v $(pwd)/certbot/www:/var/www/certbot \
              nginx:alpine
            sleep 5
            
            docker run --rm \
              -v $(pwd)/certbot/conf:/etc/letsencrypt \
              -v $(pwd)/certbot/www:/var/www/certbot \
              certbot/certbot certonly --webroot \
              --webroot-path=/var/www/certbot \
              --email admin@maestroegp.com \
              --agree-tos --no-eff-email \
              -d maestroegp.com -d www.maestroegp.com \
              --non-interactive || true
            
            docker stop temp-nginx 2>/dev/null || true
            docker rm temp-nginx 2>/dev/null || true
            rm -f nginx-temp.conf
            
            # تشغيل الخدمات (MongoDB يعمل أصلاً)
            docker-compose up -d backend frontend nginx
            sleep 30
          else
            # =============================================
            # 🔄 تحديث بدون توقف - MongoDB لا يُمس أبداً
            # =============================================
            
            echo ""
            echo "============================================="
            echo "🔄 Zero Downtime Update"
            echo "============================================="
            echo "⚠️ MongoDB سيبقى يعمل طوال التحديث"
            echo "⚠️ لن نستخدم docker-compose down أبداً"
            echo "============================================="
            echo ""
            
            # بناء الـ images الجديدة فقط (Backend + Frontend) - بدون cache
            # MongoDB لا يُبنى - يستخدم image جاهز
            echo "🔨 Building new images (Backend + Frontend only)..."
            docker-compose build --no-cache --pull frontend backend
            
            # تحديث Backend فقط
            echo ""
            echo "📦 Updating Backend only..."
            docker-compose up -d --no-deps --force-recreate backend
            
            # انتظار Backend
            echo "⏳ Waiting for Backend..."
            sleep 20
            
            # التحقق من Backend
            for i in {1..30}; do
              if curl -s http://localhost:8001/api/health > /dev/null 2>&1; then
                echo "✅ Backend is healthy!"
                break
              fi
              echo "   Waiting... ($i/30)"
              sleep 2
            done
            
            # تحديث Frontend فقط
            echo ""
            echo "🎨 Updating Frontend only..."
            docker-compose up -d --no-deps --force-recreate frontend
            sleep 10
            
            # تحديث Nginx فقط
            echo ""
            echo "🌐 Reloading Nginx..."
            docker-compose exec -T nginx nginx -s reload 2>/dev/null || \
              docker-compose up -d --no-deps --force-recreate nginx
            sleep 5
          fi
          
          # =============================================
          # ✅ التحقق النهائي
          # =============================================
          
          echo ""
          echo "============================================="
          echo "🔍 Final Verification"
          echo "============================================="
          
          # التحقق من الخدمات
          echo ""
          echo "📊 Services Status:"
          docker-compose ps
          
          # التحقق من MongoDB
          echo ""
          echo "🗄️ MongoDB Status:"
          if docker ps | grep -q maestro-mongodb; then
            echo "✅ MongoDB is running"
            echo "✅ All data is protected"
          else
            echo "❌ MongoDB is not running!"
          fi
          
          # اختبار تسجيل الدخول
          echo ""
          echo "🔐 Testing Login..."
          LOGIN_TEST=$(curl -s -X POST http://localhost:8001/api/super-admin/login \
            -H "Content-Type: application/json" \
            -d '{"email":"owner@maestroegp.com","password":"owner123","secret_key":"271018"}' \
            2>/dev/null)
          
          if echo "$LOGIN_TEST" | grep -q "token"; then
            echo "✅ Login is working!"
          else
            echo "⚠️ Login issue, restarting Backend and Nginx..."
            docker-compose restart backend nginx
            sleep 20
            
            LOGIN_TEST2=$(curl -s -X POST http://localhost:8001/api/super-admin/login \
              -H "Content-Type: application/json" \
              -d '{"email":"owner@maestroegp.com","password":"owner123","secret_key":"271018"}' \
              2>/dev/null)
            
            if echo "$LOGIN_TEST2" | grep -q "token"; then
              echo "✅ Login working after restart!"
            else
              echo "❌ Login still failing. Logs:"
              docker-compose logs --tail=50 backend
            fi
          fi
          
          # تنظيف (لا نحذف volumes أبداً)
          docker image prune -f 2>/dev/null || true
          
          # =============================================
          # 🛡️ إعداد المراقبة التلقائية (Auto Health Check)
          # =============================================
          echo ""
          echo "🛡️ Setting up Auto Health Monitor..."
          
          cat > /root/check-maestro.sh << 'HEALTHEOF'
#!/bin/bash
# Maestro Auto Health Check - يفحص كل 5 دقائق ويصلح تلقائياً

LOG_FILE="/var/log/maestro-monitor.log"

# فحص إذا كان الموقع يعمل
if ! curl -s --max-time 10 http://127.0.0.1/api/health > /dev/null 2>&1; then
    echo "$(date): ⚠️ Maestro not responding, attempting restart..." >> $LOG_FILE
    
    cd /var/www/maestro
    
    # إعادة تشغيل الخدمات
    docker-compose restart backend nginx frontend 2>/dev/null
    
    sleep 30
    
    # فحص مرة أخرى
    if curl -s --max-time 10 http://127.0.0.1/api/health > /dev/null 2>&1; then
        echo "$(date): ✅ Maestro recovered successfully" >> $LOG_FILE
    else
        echo "$(date): ❌ Maestro still down after restart" >> $LOG_FILE
        # محاولة أخيرة - إعادة تشغيل كاملة
        docker-compose down
        docker-compose up -d
        sleep 30
        if curl -s --max-time 10 http://127.0.0.1/api/health > /dev/null 2>&1; then
            echo "$(date): ✅ Maestro recovered after full restart" >> $LOG_FILE
        else
            echo "$(date): ❌ CRITICAL: Maestro failed to recover" >> $LOG_FILE
        fi
    fi
fi
HEALTHEOF
          
          chmod +x /root/check-maestro.sh
          
          # إضافة للـ crontab إذا لم يكن موجوداً
          if ! crontab -l 2>/dev/null | grep -q "check-maestro.sh"; then
              (crontab -l 2>/dev/null; echo "*/5 * * * * /root/check-maestro.sh") | crontab -
              echo "✅ Auto Health Monitor installed (runs every 5 minutes)"
          else
              echo "✅ Auto Health Monitor already installed"
          fi
          
          echo ""
          echo "============================================="
          echo "✅ Deployment Complete"
          echo "============================================="
          echo "✅ MongoDB: Running (data protected)"
          echo "✅ Backend: Updated"
          echo "✅ Frontend: Updated"
          echo "✅ Nginx: Updated"
          echo "✅ Auto Monitor: Active (every 5 min)"
          echo "✅ بيانات العملاء: محمية"
          echo "✅ بياناتك: محمية"
          echo "⏰ $(date)"
          echo "============================================="
          
    - name: 📢 Notify Success
      if: success()
      run: echo "✅ Deployment successful - All data protected!"
      
    - name: ❌ Notify Failure
      if: failure()
      run: echo "❌ Deployment failed!"
