name: 🚀 Deploy Maestro POS to Production

on:
  push:
    branches: [ main, conflict_230326_0646 ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔑 Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        command_timeout: 30m
        script: |
          echo "🚀 Starting Zero-Downtime deployment at $(date)"
          echo "⚠️ النظام يبقى يعمل أثناء التحديث - المستخدمون لن يتأثروا"
          
          # إيقاف Nginx القديم على Ubuntu (غير Docker)
          systemctl stop nginx 2>/dev/null || true
          systemctl disable nginx 2>/dev/null || true
          
          cd /var/www/maestro
          
          # سحب أحدث الكود
          echo "📥 Pulling latest code..."
          git fetch origin
          git reset --hard origin/conflict_230326_0646
          
          mkdir -p certbot/conf certbot/www backups deploy/backups uploads
          
          # التحقق من SSL - فقط إذا لم يكن موجوداً
          if [ ! -d "certbot/conf/live/maestroegp.com" ]; then
            echo "🔐 Getting SSL certificate..."
            # هذا يحدث مرة واحدة فقط عند أول تثبيت
            docker-compose down 2>/dev/null || true
            
            cat > nginx-temp.conf << 'NGINXEOF'
          events { worker_connections 1024; }
          http {
            server {
              listen 80;
              server_name maestroegp.com www.maestroegp.com;
              location /.well-known/acme-challenge/ { root /var/www/certbot; }
              location / { return 200 'SSL Setup'; add_header Content-Type text/plain; }
            }
          }
          NGINXEOF
            
            docker run -d --name temp-nginx -p 80:80 \
              -v $(pwd)/nginx-temp.conf:/etc/nginx/nginx.conf:ro \
              -v $(pwd)/certbot/www:/var/www/certbot \
              nginx:alpine
            
            sleep 5
            
            docker run --rm \
              -v $(pwd)/certbot/conf:/etc/letsencrypt \
              -v $(pwd)/certbot/www:/var/www/certbot \
              certbot/certbot certonly --webroot \
              --webroot-path=/var/www/certbot \
              --email admin@maestroegp.com \
              --agree-tos --no-eff-email \
              -d maestroegp.com -d www.maestroegp.com \
              --non-interactive || true
            
            docker stop temp-nginx 2>/dev/null || true
            docker rm temp-nginx 2>/dev/null || true
            rm -f nginx-temp.conf
            
            # تشغيل كل الخدمات لأول مرة
            docker-compose up -d
            sleep 30
          else
            # =============================================
            # 🔄 تحديث بدون توقف - Zero Downtime Update
            # =============================================
            # ⚠️ مهم: لا نستخدم docker-compose down أبداً!
            # النظام يبقى يعمل طوال عملية التحديث
            
            echo ""
            echo "============================================="
            echo "🔄 Zero Downtime Update - تحديث بدون توقف"
            echo "============================================="
            echo "✅ MongoDB يبقى يعمل - البيانات محفوظة"
            echo "✅ المستخدمون يستطيعون استخدام النظام"
            echo ""
            
            # بناء الـ images الجديدة (النظام يعمل أثناء البناء)
            echo "🔨 Building new images..."
            echo "   النظام يعمل بشكل طبيعي أثناء البناء..."
            docker-compose build --build-arg CACHEBUST=$(date +%s) frontend backend
            
            echo ""
            echo "🔄 Updating services one by one..."
            echo "   تحديث خدمة واحدة في كل مرة لضمان استمرار العمل"
            echo ""
            
            # 1. تحديث Backend (MongoDB و Frontend يعملان)
            echo "📦 [1/3] Updating Backend..."
            echo "   Frontend و Nginx يعملان - المستخدمون يستطيعون التصفح"
            docker-compose up -d --no-deps --force-recreate backend
            
            # انتظار Backend ليبدأ
            echo "   Waiting for Backend to start..."
            sleep 15
            
            # التحقق من أن Backend يعمل
            for i in {1..10}; do
              if docker-compose exec -T backend curl -s http://localhost:8001/api/health > /dev/null 2>&1; then
                echo "   ✅ Backend is healthy"
                break
              fi
              echo "   Waiting for Backend... ($i/10)"
              sleep 3
            done
            
            # 2. تحديث Frontend (Backend و Nginx يعملان)
            echo ""
            echo "🎨 [2/3] Updating Frontend..."
            echo "   Backend و Nginx يعملان - API متاح"
            docker-compose up -d --no-deps --force-recreate frontend
            sleep 10
            
            # 3. إعادة تحميل Nginx لتحديث الـ cache (بدون توقف)
            echo ""
            echo "🌐 [3/3] Reloading Nginx..."
            docker-compose exec -T nginx nginx -s reload 2>/dev/null || \
              docker-compose up -d --no-deps --force-recreate nginx
            sleep 5
          fi
          
          # =============================================
          # ✅ التحقق من الخدمات
          # =============================================
          
          echo ""
          echo "============================================="
          echo "📊 Services Status"
          echo "============================================="
          docker-compose ps
          
          echo ""
          echo "📋 Backend Health Check:"
          docker-compose logs --tail=20 backend | grep -E "startup|running|ready|error" || true
          
          # تنظيف الـ images القديمة
          echo ""
          echo "🧹 Cleaning old images..."
          docker image prune -f 2>/dev/null || true
          
          echo ""
          echo "============================================="
          echo "✅ Zero-Downtime deployment completed!"
          echo "============================================="
          echo "✅ البيانات محفوظة - MongoDB لم يتوقف أبداً"
          echo "✅ المستخدمون لم يتأثروا أثناء التحديث"
          echo "✅ النظام يعمل بشكل طبيعي الآن"
          echo "⏰ Completed at $(date)"
          echo "============================================="
          
    - name: 📢 Notify Success
      if: success()
      run: echo "✅ Deployment successful!"
      
    - name: ❌ Notify Failure
      if: failure()
      run: echo "❌ Deployment failed!"
