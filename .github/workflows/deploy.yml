name: 🚀 Deploy Maestro POS to Production

on:
  push:
    branches: [ main, conflict_230326_0646 ]
  workflow_dispatch:  # للتشغيل اليدوي

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔑 Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          echo "🚀 Starting deployment at $(date)"
          
          # الدخول لمجلد المشروع
          cd /var/www/maestro
          
          # سحب أحدث الكود
          git fetch origin
          git reset --hard origin/conflict_230326_0646
          
          # إنشاء مجلدات SSL
          mkdir -p certbot/conf certbot/www
          
          # بناء الـ images الجديدة بدون إيقاف الخدمات الحالية
          echo "🔨 Building new images..."
          docker-compose build --no-cache
          
          # تحديث الخدمات واحدة تلو الأخرى (Zero Downtime)
          echo "🔄 Updating services with zero downtime..."
          
          # تحديث MongoDB أولاً (إذا لزم الأمر)
          docker-compose up -d mongodb
          sleep 10
          
          # تحديث Backend
          docker-compose up -d --no-deps backend
          sleep 15
          
          # تحديث Frontend
          docker-compose up -d --no-deps frontend
          sleep 10
          
          # تحديث Nginx
          docker-compose up -d --no-deps nginx 2>/dev/null || docker-compose up -d nginx
          
          # تحديث Portainer و Netdata
          docker-compose up -d --no-deps portainer netdata 2>/dev/null || true
          
          # انتظار استقرار الخدمات
          echo "⏳ Waiting for services to stabilize..."
          sleep 30
          
          # انتظار MongoDB
          echo "⏳ Waiting for MongoDB..."
          for i in {1..30}; do
            if docker exec maestro-mongodb mongosh --eval "db.adminCommand('ping')" -u maestro_admin -p "Maestro@2024Secure" --authenticationDatabase admin > /dev/null 2>&1; then
              echo "✅ MongoDB is ready"
              break
            fi
            echo "Waiting for MongoDB... ($i/30)"
            sleep 5
          done
          
          # تشغيل سكريبت إدخال البيانات الأساسية
          echo "📦 Running seed data script..."
          docker exec maestro-backend pip install bcrypt pymongo 2>/dev/null || true
          docker exec maestro-backend python /app/seed_data.py || echo "Seed completed or already exists"
          
          # تنظيف الـ images القديمة
          docker image prune -f
          
          # عرض حالة الخدمات
          echo "📊 Services status:"
          docker-compose ps
          
          echo "✅ Deployment completed at $(date)"
          
          # تنظيف الـ images القديمة
          docker image prune -f
          
          # عرض حالة الخدمات
          docker-compose ps
          
          echo "✅ Deployment completed at $(date)"
          
    - name: 📢 Notify Success
      if: success()
      run: echo "✅ Deployment successful!"
      
    - name: ❌ Notify Failure
      if: failure()
      run: echo "❌ Deployment failed!"
