name: 🚀 Deploy Maestro POS

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout
      uses: actions/checkout@v4
      
    - name: 🔑 Deploy
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: 158.220.118.54
        username: root
        key: ${{ secrets.VPS_SSH_KEY }}
        port: 22
        command_timeout: 30m
        script: |
          echo "🚀 بدء النشر..."
          cd /var/www/maestro
          
          # سحب الكود
          git fetch origin && git reset --hard origin/main
          
          # =============================================
          # ضمان عمل MongoDB
          # =============================================
          if ! docker ps | grep -q "maestro-mongodb"; then
            echo "🗄️ تشغيل MongoDB..."
            docker run -d --name maestro-mongodb --network maestro_maestro-network -v maestro_mongodb_data:/data/db mongo:7 2>/dev/null || docker start maestro-mongodb
            sleep 10
          fi
          
          # =============================================
          # تحديث Backend (بدون توقف)
          # =============================================
          echo "📦 تحديث Backend..."
          
          # بناء image جديد
          docker build -t maestro_backend:new ./backend
          
          # إيقاف القديم وتشغيل الجديد
          docker stop backend 2>/dev/null || true
          docker rm backend 2>/dev/null || true
          docker tag maestro_backend:new maestro_backend:latest
          docker run -d --name backend \
            --network maestro_maestro-network \
            -v /var/www/maestro/uploads:/app/uploads \
            -e MONGO_URL="mongodb://maestro-mongodb:27017" \
            -e DB_NAME="maestro_db" \
            maestro_backend:latest
          
          # انتظار Backend
          echo "⏳ انتظار Backend..."
          for i in {1..30}; do
            if docker exec backend curl -s http://localhost:8001/api/health > /dev/null 2>&1; then
              echo "✅ Backend جاهز!"
              break
            fi
            sleep 2
          done
          
          # =============================================
          # تحديث Frontend (بدون توقف)
          # =============================================
          echo "🎨 تحديث Frontend..."
          
          # بناء image جديد
          docker build -t maestro_frontend:new ./frontend
          
          # إيقاف القديم وتشغيل الجديد
          docker stop frontend 2>/dev/null || true
          docker rm frontend 2>/dev/null || true
          docker tag maestro_frontend:new maestro_frontend:latest
          docker run -d --name frontend \
            --network maestro_maestro-network \
            maestro_frontend:latest
          
          # =============================================
          # ضمان عمل Nginx
          # =============================================
          if ! docker ps | grep -q "nginx"; then
            echo "🌐 تشغيل Nginx..."
            docker run -d --name nginx \
              --network maestro_maestro-network \
              -p 80:80 -p 443:443 \
              -v /var/www/maestro/nginx.conf:/etc/nginx/nginx.conf:ro \
              -v /var/www/maestro/certbot/conf:/etc/letsencrypt:ro \
              nginx:alpine
          else
            docker exec nginx nginx -s reload 2>/dev/null || docker restart nginx
          fi
          
          # =============================================
          # التحقق النهائي
          # =============================================
          echo ""
          echo "📊 حالة الخدمات:"
          docker ps --format "table {{.Names}}\t{{.Status}}"
          
          echo ""
          if curl -s http://127.0.0.1/api/health | grep -q "ok"; then
            echo "✅ النشر نجح!"
          else
            echo "⚠️ تحذير: API قد يحتاج وقت للبدء"
          fi
          
          # تنظيف
          docker image prune -f 2>/dev/null || true
          
          echo "✅ انتهى!"
