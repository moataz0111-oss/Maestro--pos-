name: 🚀 Deploy Maestro POS to Production

on:
  push:
    branches: [ main, conflict_230326_0646 ]
  workflow_dispatch:  # للتشغيل اليدوي

jobs:
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    
    steps:
    - name: 📥 Checkout code
      uses: actions/checkout@v4
      
    - name: 🔑 Deploy via SSH
      uses: appleboy/ssh-action@v1.0.3
      with:
        host: ${{ secrets.VPS_HOST }}
        username: ${{ secrets.VPS_USER }}
        key: ${{ secrets.VPS_SSH_KEY }}
        port: ${{ secrets.VPS_PORT }}
        script: |
          echo "🚀 Starting deployment at $(date)"
          
          # إيقاف Nginx القديم على Ubuntu
          echo "🛑 Stopping old nginx..."
          systemctl stop nginx 2>/dev/null || true
          systemctl disable nginx 2>/dev/null || true
          
          # الدخول لمجلد المشروع
          cd /var/www/maestro
          
          # سحب أحدث الكود
          git fetch origin
          git reset --hard origin/conflict_230326_0646
          
          # إنشاء مجلدات
          mkdir -p certbot/conf certbot/www backups deploy/backups
          
          # التحقق من وجود شهادة SSL
          if [ ! -d "certbot/conf/live/maestroegp.com" ]; then
            echo "🔐 SSL certificate not found, obtaining new certificate..."
            
            # تشغيل Nginx مؤقتاً للحصول على الشهادة
            docker-compose down 2>/dev/null || true
            
            # إنشاء nginx.conf مؤقت للحصول على الشهادة
            cat > nginx-temp.conf << 'NGINXEOF'
          events { worker_connections 1024; }
          http {
            server {
              listen 80;
              server_name maestroegp.com www.maestroegp.com;
              location /.well-known/acme-challenge/ { root /var/www/certbot; }
              location / { return 200 'SSL Setup in progress'; add_header Content-Type text/plain; }
            }
          }
          NGINXEOF
            
            # تشغيل nginx مؤقت
            docker run -d --name temp-nginx -p 80:80 \
              -v $(pwd)/nginx-temp.conf:/etc/nginx/nginx.conf:ro \
              -v $(pwd)/certbot/www:/var/www/certbot \
              nginx:alpine
            
            sleep 5
            
            # الحصول على شهادة SSL
            docker run --rm \
              -v $(pwd)/certbot/conf:/etc/letsencrypt \
              -v $(pwd)/certbot/www:/var/www/certbot \
              certbot/certbot certonly --webroot \
              --webroot-path=/var/www/certbot \
              --email admin@maestroegp.com \
              --agree-tos --no-eff-email \
              -d maestroegp.com -d www.maestroegp.com \
              --non-interactive || echo "Certbot may have failed, continuing..."
            
            # إيقاف nginx المؤقت
            docker stop temp-nginx 2>/dev/null || true
            docker rm temp-nginx 2>/dev/null || true
            rm -f nginx-temp.conf
            
            echo "✅ SSL certificate obtained"
          else
            echo "✅ SSL certificate already exists"
          fi
          
          # إيقاف وحذف كل شيء قديم
          echo "🛑 Stopping and removing old containers..."
          docker-compose down --remove-orphans 2>/dev/null || true
          
          # حذف images القديمة للـ frontend لإجبار إعادة البناء
          echo "🗑️ Removing old frontend image..."
          docker rmi maestro_frontend -f 2>/dev/null || true
          docker rmi $(docker images -q --filter "dangling=true") -f 2>/dev/null || true
          docker system prune -f 2>/dev/null || true
          
          # بناء وتشغيل Docker (بدون cache لتجنب المشاكل)
          echo "🔨 Building and starting services..."
          docker-compose build --no-cache --build-arg CACHEBUST=$(date +%s) frontend backend
          docker-compose up -d --force-recreate
          
          # انتظار بدء الخدمات
          echo "⏳ Waiting for services to start..."
          sleep 45
          
          # عرض حالة الخدمات
          echo "📊 Services status:"
          docker-compose ps
          
          # عرض logs للتحقق من الأخطاء
          echo "📋 Backend logs (last 100 lines):"
          docker-compose logs --tail=100 backend || docker logs maestro-backend --tail=100
          
          echo "📋 MongoDB logs:"
          docker-compose logs --tail=20 mongodb
          
          echo "📋 Nginx logs:"
          docker-compose logs --tail=20 nginx
          
          # انتظار MongoDB
          echo "⏳ Waiting for MongoDB..."
          for i in {1..30}; do
            if docker exec maestro-mongodb mongosh --eval "db.adminCommand('ping')" -u maestro_admin -p "Maestro@2024Secure" --authenticationDatabase admin > /dev/null 2>&1; then
              echo "✅ MongoDB is ready"
              break
            fi
            echo "Waiting for MongoDB... ($i/30)"
            sleep 5
          done
          
          # تشغيل سكريبت إدخال البيانات
          echo "📦 Running seed data script..."
          docker exec maestro-backend pip install bcrypt pymongo 2>/dev/null || true
          docker exec maestro-backend python /app/seed_data.py || echo "Seed completed"
          
          # تشغيل سكريبت البيانات التجريبية لـ Graffiti Burger
          echo "📦 Running demo data script for Graffiti Burger..."
          docker exec maestro-backend python /app/seed_demo_data.py || echo "Demo data completed"
          
          # إعداد Backup التلقائي
          chmod +x /var/www/maestro/scripts/backup.sh 2>/dev/null || true
          (crontab -l 2>/dev/null | grep -v "maestro.*backup"; echo "0 3 * * * /var/www/maestro/scripts/backup.sh >> /var/log/maestro-backup.log 2>&1") | crontab -
          
          # تنظيف
          docker image prune -f
          
          echo "✅ Deployment completed at $(date)"
          
    - name: 📢 Notify Success
      if: success()
      run: echo "✅ Deployment successful!"
      
    - name: ❌ Notify Failure
      if: failure()
      run: echo "❌ Deployment failed!"
