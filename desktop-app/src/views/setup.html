<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>إعداد Maestro POS</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: direction 0.3s ease;
    }
    
    body.en {
      direction: ltr;
    }
    
    body.ar {
      direction: rtl;
    }
    
    .setup-container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 500px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
      position: relative;
    }
    
    .lang-switcher {
      position: absolute;
      top: 15px;
      left: 15px;
      display: flex;
      gap: 5px;
      background: #f0f0f0;
      padding: 5px;
      border-radius: 25px;
    }
    
    body.en .lang-switcher {
      left: auto;
      right: 15px;
    }
    
    .lang-btn {
      padding: 8px 16px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      font-size: 14px;
      font-weight: 600;
      transition: all 0.3s ease;
      background: transparent;
      color: #666;
    }
    
    .lang-btn.active {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: white;
    }
    
    .lang-btn:hover:not(.active) {
      background: #e0e0e0;
    }
    
    .logo {
      text-align: center;
      margin-bottom: 30px;
      margin-top: 20px;
    }
    
    .logo h1 {
      font-size: 32px;
      color: #1a1a2e;
      margin-bottom: 10px;
    }
    
    .logo p {
      color: #666;
      font-size: 14px;
    }
    
    .form-group {
      margin-bottom: 20px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #333;
    }
    
    .form-group input {
      width: 100%;
      padding: 14px 16px;
      border: 2px solid #e0e0e0;
      border-radius: 10px;
      font-size: 16px;
      transition: all 0.3s ease;
      direction: ltr;
      text-align: left;
    }
    
    .form-group input:focus {
      outline: none;
      border-color: #f59e0b;
      box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
    }
    
    .form-group .hint {
      font-size: 12px;
      color: #888;
      margin-top: 5px;
    }
    
    .btn {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: 10px;
      font-size: 18px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
    }
    
    .btn-primary:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }
    
    .status {
      margin-top: 20px;
      padding: 15px;
      border-radius: 10px;
      text-align: center;
      display: none;
    }
    
    .status.success {
      background: #d4edda;
      color: #155724;
      display: block;
    }
    
    .status.error {
      background: #f8d7da;
      color: #721c24;
      display: block;
    }
    
    .status.loading {
      background: #e7f3ff;
      color: #004085;
      display: block;
    }
    
    .version-info {
      text-align: center;
      margin-top: 20px;
      color: #999;
      font-size: 12px;
    }
  </style>
</head>
<body class="ar">
  <div class="setup-container">
    <div class="lang-switcher">
      <button class="lang-btn active" data-lang="ar" onclick="switchLang('ar')">عربي</button>
      <button class="lang-btn" data-lang="en" onclick="switchLang('en')">EN</button>
    </div>
    
    <div class="logo">
      <h1>🍽️ Maestro POS</h1>
      <p data-i18n="subtitle">برنامج نقطة البيع - الإعداد الأولي</p>
    </div>
    
    <form id="setupForm">
      <div class="form-group">
        <label data-i18n="serverUrl">رابط السيرفر</label>
        <input 
          type="url" 
          id="serverUrl" 
          placeholder="https://your-app.emergentagent.com"
          required
        >
        <div class="hint" data-i18n="serverHint">أدخل رابط التطبيق المنشور على الإنترنت</div>
      </div>
      
      <div class="form-group">
        <label data-i18n="email">البريد الإلكتروني</label>
        <input 
          type="email" 
          id="email" 
          placeholder="user@example.com"
          required
        >
      </div>
      
      <div class="form-group">
        <label data-i18n="password">كلمة المرور</label>
        <input 
          type="password" 
          id="password" 
          placeholder="••••••••"
          required
        >
      </div>
      
      <button type="submit" class="btn btn-primary" id="connectBtn" data-i18n="connect">
        اتصال بالسيرفر
      </button>
      
      <div id="status" class="status"></div>
    </form>
    
    <div class="version-info" id="versionInfo"></div>
  </div>

  <script>
    // الترجمات
    const translations = {
      ar: {
        subtitle: 'برنامج نقطة البيع - الإعداد الأولي',
        serverUrl: 'رابط السيرفر',
        serverHint: 'أدخل رابط التطبيق المنشور على الإنترنت',
        email: 'البريد الإلكتروني',
        password: 'كلمة المرور',
        connect: 'اتصال بالسيرفر',
        connecting: 'جاري الاتصال...',
        success: '✅ تم الاتصال بنجاح! جاري تحميل التطبيق...',
        loginFailed: 'فشل تسجيل الدخول',
        version: 'الإصدار'
      },
      en: {
        subtitle: 'Point of Sale - Initial Setup',
        serverUrl: 'Server URL',
        serverHint: 'Enter your application URL',
        email: 'Email Address',
        password: 'Password',
        connect: 'Connect to Server',
        connecting: 'Connecting...',
        success: '✅ Connected successfully! Loading application...',
        loginFailed: 'Login failed',
        version: 'Version'
      }
    };
    
    let currentLang = 'ar';
    
    // تغيير اللغة
    async function switchLang(lang) {
      currentLang = lang;
      document.body.className = lang;
      document.documentElement.dir = lang === 'ar' ? 'rtl' : 'ltr';
      document.documentElement.lang = lang;
      
      // تحديث الأزرار
      document.querySelectorAll('.lang-btn').forEach(btn => {
        btn.classList.toggle('active', btn.dataset.lang === lang);
      });
      
      // تحديث النصوص
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const key = el.dataset.i18n;
        if (translations[lang][key]) {
          el.textContent = translations[lang][key];
        }
      });
      
      // حفظ اللغة في localStorage
      localStorage.setItem('maestro-lang', lang);
      
      // حفظ اللغة في Electron Store
      if (window.electronAPI && window.electronAPI.saveLanguage) {
        await window.electronAPI.saveLanguage(lang);
      }
    }
    
    // تحميل اللغة المحفوظة
    async function loadSavedLanguage() {
      let savedLang = localStorage.getItem('maestro-lang');
      
      // محاولة جلب اللغة من Electron Store
      if (window.electronAPI && window.electronAPI.getLanguage) {
        try {
          const electronLang = await window.electronAPI.getLanguage();
          if (electronLang) savedLang = electronLang;
        } catch (e) {}
      }
      
      if (savedLang) {
        switchLang(savedLang);
      }
    }
    loadSavedLanguage();
    
    // عرض إصدار التطبيق
    async function showVersion() {
      try {
        if (window.electronAPI && window.electronAPI.getAppVersion) {
          const version = await window.electronAPI.getAppVersion();
          const t = translations[currentLang];
          document.getElementById('versionInfo').textContent = `${t.version}: ${version}`;
        }
      } catch (e) {
        console.log('Could not get app version');
      }
    }
    showVersion();
    
    // النموذج
    const form = document.getElementById('setupForm');
    const statusDiv = document.getElementById('status');
    const connectBtn = document.getElementById('connectBtn');
    
    // عند تقديم النموذج
    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      const serverUrl = document.getElementById('serverUrl').value.trim().replace(/\/$/, ''); // إزالة / من النهاية
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const t = translations[currentLang];
      
      connectBtn.disabled = true;
      showStatus(t.connecting, 'loading');
      
      try {
        // اختبار الاتصال وتسجيل الدخول
        const response = await fetch(`${serverUrl}/api/auth/login`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, password })
        });
        
        const data = await response.json();
        
        if (!response.ok) {
          throw new Error(data.detail || t.loginFailed);
        }
        
        // حفظ الإعدادات
        if (window.electronAPI && window.electronAPI.saveSettings) {
          await window.electronAPI.saveSettings({
            serverUrl,
            authToken: data.token,
            userEmail: email,
            userName: data.user?.full_name || email,
            branchId: data.user?.branch_id || ''
          });
        }
        
        showStatus(t.success, 'success');
        
        // الانتقال للتطبيق الرئيسي بعد حفظ الإعدادات
        setTimeout(async () => {
          if (window.electronAPI && window.electronAPI.loadServerUrl) {
            await window.electronAPI.loadServerUrl(serverUrl);
          }
        }, 1000);
        }, 1500);
        
      } catch (error) {
        showStatus(`❌ ${error.message}`, 'error');
        connectBtn.disabled = false;
      }
    });
    
    // إظهار حالة
    function showStatus(message, type) {
      statusDiv.textContent = message;
      statusDiv.className = `status ${type}`;
    }
  </script>
</body>
</html>
