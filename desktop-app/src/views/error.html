<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>خطأ في الاتصال</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: 'Segoe UI', Tahoma, Arial, sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      direction: rtl;
    }
    
    .error-container {
      background: rgba(255, 255, 255, 0.95);
      border-radius: 20px;
      padding: 40px;
      width: 100%;
      max-width: 500px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
    }
    
    .error-icon {
      font-size: 64px;
      margin-bottom: 20px;
    }
    
    .title {
      font-size: 24px;
      font-weight: bold;
      color: #dc2626;
      margin-bottom: 15px;
    }
    
    .message {
      font-size: 16px;
      color: #666;
      margin-bottom: 30px;
      line-height: 1.6;
    }
    
    .btn {
      display: inline-block;
      padding: 14px 28px;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.3s ease;
      margin: 5px;
    }
    
    .btn-primary {
      background: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
      color: white;
    }
    
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 20px rgba(245, 158, 11, 0.3);
    }
    
    .btn-secondary {
      background: #e5e7eb;
      color: #374151;
    }
    
    .btn-secondary:hover {
      background: #d1d5db;
    }
    
    .tips {
      margin-top: 30px;
      padding-top: 20px;
      border-top: 1px solid #e5e7eb;
      text-align: right;
    }
    
    .tips h3 {
      font-size: 14px;
      color: #374151;
      margin-bottom: 10px;
    }
    
    .tips ul {
      font-size: 13px;
      color: #666;
      padding-right: 20px;
    }
    
    .tips li {
      margin-bottom: 5px;
    }
  </style>
</head>
<body>
  <div class="error-container">
    <div class="error-icon">⚠️</div>
    <div class="title">فشل الاتصال بالسيرفر</div>
    <div class="message">
      لم نتمكن من الاتصال بالسيرفر. تأكد من اتصالك بالإنترنت وأن رابط السيرفر صحيح.
    </div>
    
    <button class="btn btn-primary" onclick="retry()">
      🔄 إعادة المحاولة
    </button>
    <button class="btn btn-secondary" onclick="resetServer()">
      ⚙️ تغيير السيرفر
    </button>
    
    <div class="tips">
      <h3>💡 نصائح:</h3>
      <ul>
        <li>تأكد من اتصالك بالإنترنت</li>
        <li>تأكد من أن رابط السيرفر صحيح</li>
        <li>جرب إعادة تشغيل التطبيق</li>
        <li>تواصل مع الدعم الفني إذا استمرت المشكلة</li>
      </ul>
    </div>
  </div>

  <script>
    async function retry() {
      if (window.electronAPI && window.electronAPI.getServerUrl) {
        const serverUrl = await window.electronAPI.getServerUrl();
        if (serverUrl && window.electronAPI.loadServerUrl) {
          await window.electronAPI.loadServerUrl(serverUrl);
        } else if (window.electronAPI.reloadApp) {
          await window.electronAPI.reloadApp();
        }
      }
    }
    
    async function resetServer() {
      if (window.electronAPI && window.electronAPI.saveSettings) {
        await window.electronAPI.saveSettings({ serverUrl: '' });
      }
      // إعادة تحميل لعرض صفحة الإعداد
      if (window.electronAPI && window.electronAPI.reloadApp) {
        await window.electronAPI.reloadApp();
      }
    }
  </script>
</body>
</html>
