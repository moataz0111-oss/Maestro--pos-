<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- خلفية دائرية -->
  <circle cx="512" cy="512" r="512" fill="url(#gradient)"/>
  
  <!-- رمز المطعم/الطعام -->
  <g transform="translate(200, 200) scale(0.6)">
    <!-- طبق -->
    <ellipse cx="520" cy="600" rx="350" ry="80" fill="#ffffff" opacity="0.3"/>
    <ellipse cx="520" cy="580" rx="320" ry="70" fill="#ffffff" opacity="0.5"/>
    
    <!-- قبة الطعام -->
    <path d="M200 500 Q200 200 520 200 Q840 200 840 500 L200 500 Z" fill="#ffffff"/>
    
    <!-- يد القبة -->
    <rect x="480" y="120" width="80" height="80" rx="20" fill="#f59e0b"/>
    <circle cx="520" cy="100" r="30" fill="#f59e0b"/>
    
    <!-- بخار -->
    <path d="M350 450 Q330 400 350 350" stroke="#ffffff" stroke-width="20" fill="none" stroke-linecap="round" opacity="0.6"/>
    <path d="M520 430 Q500 370 520 310" stroke="#ffffff" stroke-width="25" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M690 450 Q710 400 690 350" stroke="#ffffff" stroke-width="20" fill="none" stroke-linecap="round" opacity="0.6"/>
  </g>
  
  <!-- النص -->
  <text x="512" y="850" text-anchor="middle" fill="#ffffff" font-family="Arial, sans-serif" font-size="120" font-weight="bold">POS</text>
  
  <!-- التدرج -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="50%" style="stop-color:#d97706"/>
      <stop offset="100%" style="stop-color:#b45309"/>
    </linearGradient>
  </defs>
</svg>
